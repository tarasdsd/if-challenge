<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PE Tilt Game (Real Detection)</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
body { font-family: Arial; text-align: center; background:#f4f4f4; }
video { width: 300px; border-radius: 10px; }
.question { font-size: 20px; margin: 20px; }
.options { display: flex; justify-content: space-around; }
.option { width: 40%; padding: 10px; background: #fff; border-radius: 10px; }
.left { border: 2px solid blue; }
.right { border: 2px solid green; }
#timer { font-size: 24px; margin: 10px; }
#result { font-size: 22px; margin-top: 15px; }
</style>
</head>
<body>

<h1>PE Tilt Game</h1>
<video id="webcam" autoplay playsinline></video>
<div id="timer">Time: 10</div>
<div class="question" id="question"></div>

<div class="options">
<div class="option left" id="leftOption"></div>
<div class="option right" id="rightOption"></div>
</div>

<div id="result"></div>
<button onclick="startGame()">Start Game</button>

<script>
const questions = [
{q:"(Kicking a ball)", left:"If the weather is sunny, she will kick the ball outside.", right:"If the weather is rainy, she will read a book.", answer:"left"},
{q:"(Playing basketball)", left:"If the weather is stormy, he will sleep.", right:"If the weather is sunny, he will play basketball outside.", answer:"right"},
{q:"(Catching a ball)", left:"If the weather is windy, they will watch TV.", right:"If the weather is sunny, they will catch the ball outside.", answer:"right"},
{q:"(Running)", left:"If the weather is sunny, he will run in the field.", right:"If the weather is rainy, he will run outside.", answer:"left"},
{q:"(Jump rope)", left:"If the weather is stormy, she will jump rope outside.", right:"If the weather is sunny, she will jump rope outside.", answer:"right"},
{q:"(Throwing ball)", left:"If the weather is rainy, he will swim outside.", right:"If the weather is sunny, he will throw the ball outside.", answer:"right"},
{q:"(Playing football)", left:"If the weather is sunny, they will play football outside.", right:"If the weather is stormy, they will play football outside.", answer:"left"},
{q:"(Skipping)", left:"If the weather is rainy, she will skip outside.", right:"If the weather is sunny, she will skip outside.", answer:"right"},
{q:"(Playing volleyball)", left:"If the weather is sunny, they will play volleyball outside.", right:"If the weather is windy, they will sleep.", answer:"left"},
{q:"(Exercise)", left:"If the weather is sunny, he will exercise outside.", right:"If the weather is rainy, he will exercise outside.", answer:"left"}
];

let current = 0;
let time = 10;
let timerInterval;
let tiltDirection = "center";

async function setupWebcam() {
const video = document.getElementById('webcam');
const stream = await navigator.mediaDevices.getUserMedia({ video: true });
video.srcObject = stream;

const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({ maxNumFaces: 1, refineLandmarks: true });

faceMesh.onResults(results => {
if (results.multiFaceLandmarks.length > 0) {
const landmarks = results.multiFaceLandmarks[0];

const leftEye = landmarks[33];
const rightEye = landmarks[263];

const dx = rightEye.x - leftEye.x;
const dy = rightEye.y - leftEye.y;
const angle = Math.atan2(dy, dx) * (180 / Math.PI);

if (angle > 10) tiltDirection = "right";
else if (angle < -10) tiltDirection = "left";
else tiltDirection = "center";
}
});

const camera = new Camera(video, {
onFrame: async () => { await faceMesh.send({ image: video }); },
width: 300,
height: 300
});
camera.start();
}

function startGame() {
current = 0;
nextQuestion();
}

function nextQuestion() {
if (current >= questions.length) {
document.getElementById('question').innerText = "Game Finished!";
return;
}

const q = questions[current];
document.getElementById('question').innerText = q.q;
document.getElementById('leftOption').innerText = "⬅️ " + q.left;
document.getElementById('rightOption').innerText = q.right + " ➡️";

time = 10;
document.getElementById('timer').innerText = "Time: " + time;

clearInterval(timerInterval);
timerInterval = setInterval(() => {
time--;
document.getElementById('timer').innerText = "Time: " + time;
if (time <= 0) {
clearInterval(timerInterval);
checkAnswer(tiltDirection);
}
}, 1000);
}

function checkAnswer(choice) {
const correct = questions[current].answer;
const result = document.getElementById('result');

if (choice === correct) result.innerText = "✅ Correct!";
else result.innerText = "❌ Wrong!";

current++;
setTimeout(() => {
result.innerText = "";
nextQuestion();
}, 1500);
}

setupWebcam();
</script>

</body>
</html>
