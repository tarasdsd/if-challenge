<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>PE Tilt Game Clean Version</title>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/face_mesh.js"></script>
<script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
<style>
body { font-family: Arial; text-align: center; background:#1e1e2f; color:white; }
video { width: 280px; border-radius: 12px; transform: scaleX(-1); margin-top:10px; }
.question { font-size: 22px; margin: 20px; }
.options { display: flex; justify-content: space-around; gap:20px; }
.option { width: 40%; padding: 15px; border-radius: 12px; background:#2c2c3e; }
.left { border: 3px solid #4da6ff; }
.right { border: 3px solid #66ff99; }
#timer { font-size: 26px; margin: 15px; }
#result { font-size: 24px; margin-top: 15px; }
.arrow { font-size: 60px; opacity: 0.3; margin:10px; }
.active { opacity: 1; color: yellow; }
button { padding:10px 20px; font-size:18px; border:none; border-radius:10px; background:#ffcc00; cursor:pointer; }
button:hover { background:#ffd633; }
</style>
</head>
<body>

<h1>🏃 PE Tilt Game</h1>
<video id="webcam" autoplay playsinline></video>

<div>
<span id="leftArrow" class="arrow">⬅️</span>
<span id="rightArrow" class="arrow">➡️</span>
</div>

<div id="timer">Time: 10</div>
<div class="question" id="question"></div>

<div class="options">
<div class="option left" id="leftOption"></div>
<div class="option right" id="rightOption"></div>
</div>

<div id="result"></div>
<button id="startBtn" onclick="startGame()">Start Game</button>

<audio id="correctSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_115b9b0f52.mp3"></audio>
<audio id="wrongSound" src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_c8c8a73467.mp3"></audio>

<script>
const questions = [
{q:"Kicking a ball", left:"If the weather is sunny, she will kick the ball outside.", right:"If the weather is rainy, she will read a book.", answer:"left"},
{q:"Playing basketball", left:"If the weather is stormy, he will sleep.", right:"If the weather is sunny, he will play basketball outside.", answer:"right"},
{q:"Catching a ball", left:"If the weather is windy, they will watch TV.", right:"If the weather is sunny, they will catch the ball outside.", answer:"right"},
{q:"Running", left:"If the weather is sunny, he will run in the field.", right:"If the weather is rainy, he will run outside.", answer:"left"},
{q:"Jump rope", left:"If the weather is stormy, she will jump rope outside.", right:"If the weather is sunny, she will jump rope outside.", answer:"right"},
{q:"Throwing ball", left:"If the weather is rainy, he will swim outside.", right:"If the weather is sunny, he will throw the ball outside.", answer:"right"},
{q:"Playing football", left:"If the weather is sunny, they will play football outside.", right:"If the weather is stormy, they will play football outside.", answer:"left"},
{q:"Skipping", left:"If the weather is rainy, she will skip outside.", right:"If the weather is sunny, she will skip outside.", answer:"right"},
{q:"Playing volleyball", left:"If the weather is sunny, they will play volleyball outside.", right:"If the weather is windy, they will sleep.", answer:"left"},
{q:"Exercise", left:"If the weather is sunny, he will exercise outside.", right:"If the weather is rainy, he will exercise outside.", answer:"left"}
];

let current = 0;
let score = 0;
let time = 10;
let timerInterval;
let tiltDirection = "center";

function shuffle(array) {
for (let i = array.length - 1; i > 0; i--) {
const j = Math.floor(Math.random() * (i + 1));
[array[i], array[j]] = [array[j], array[i]];
}
}

async function setupWebcam() {
const video = document.getElementById('webcam');
const stream = await navigator.mediaDevices.getUserMedia({ video: true });
video.srcObject = stream;

const faceMesh = new FaceMesh({locateFile: (file) => `https://cdn.jsdelivr.net/npm/@mediapipe/face_mesh/${file}`});
faceMesh.setOptions({ maxNumFaces: 1 });

faceMesh.onResults(results => {
if (results.multiFaceLandmarks.length > 0) {
const landmarks = results.multiFaceLandmarks[0];
const leftEye = landmarks[33];
const rightEye = landmarks[263];

const dx = rightEye.x - leftEye.x;
const dy = rightEye.y - leftEye.y;
const angle = Math.atan2(dy, dx) * (180 / Math.PI);

if (angle > 10) tiltDirection = "left";
else if (angle < -10) tiltDirection = "right";
else tiltDirection = "center";

updateArrows();
}
});

const camera = new Camera(video, {
onFrame: async () => { await faceMesh.send({ image: video }); },
width: 300,
height: 300
});
camera.start();
}

function updateArrows() {
document.getElementById("leftArrow").classList.remove("active");
document.getElementById("rightArrow").classList.remove("active");

if (tiltDirection === "left") document.getElementById("leftArrow").classList.add("active");
if (tiltDirection === "right") document.getElementById("rightArrow").classList.add("active");
}

function startGame() {
shuffle(questions);
current = 0;
score = 0;
document.getElementById("startBtn").style.display = "none";
nextQuestion();
}

function nextQuestion() {
if (current >= questions.length) {
document.getElementById('question').innerText = `🎉 Congratulations! Your score: ${score}/${questions.length}`;
document.getElementById('leftOption').innerText = "";
document.getElementById('rightOption').innerText = "";
document.getElementById("startBtn").style.display = "block";
return;
}

let q = questions[current];

let isSwapped = Math.random() > 0.5;
let leftText = isSwapped ? q.right : q.left;
let rightText = isSwapped ? q.left : q.right;

let correctAnswer = q.answer;
if (isSwapped) correctAnswer = q.answer === "left" ? "right" : "left";

q.currentAnswer = correctAnswer;

document.getElementById('question').innerText = q.q;
document.getElementById('leftOption').innerText = "⬅️ " + leftText;
document.getElementById('rightOption').innerText = rightText + " ➡️";

time = 10;
document.getElementById('timer').innerText = "Time: " + time;

clearInterval(timerInterval);
timerInterval = setInterval(() => {
time--;
document.getElementById('timer').innerText = "Time: " + time;
if (time <= 0) {
clearInterval(timerInterval);
checkAnswer(tiltDirection);
}
}, 1000);
}

function checkAnswer(choice) {
const correct = questions[current].currentAnswer;
const result = document.getElementById('result');

if (choice === correct) {
result.innerText = "✅ Correct!";
document.getElementById("correctSound").play();
score++;
} else {
result.innerText = "❌ Wrong!";
document.getElementById("wrongSound").play();
}

current++;
setTimeout(() => {
result.innerText = "";
nextQuestion();
}, 1500);
}

setupWebcam();
</script>

</body>
</html>
